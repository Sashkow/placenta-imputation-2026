# Balanced 2-dataset reference (GSE100051 + GSE9984)
# Used as reference for validation test1b

paths:
  mapped_data: "data/expression"
  phenodata: "data/phenodata.tsv"
  output: "data/pipeline/balanced"
  column_map:
    arraydatafile_exprscolumnnames: "sample_id"
    secondaryaccession: "dataset_id"
    Gestational.Age.Category: "trimester"
    Diagnosis: "condition"

files:
  suffix: ""
  datasets:
    - "GSE100051"
    - "GSE9984"

sample_filter:
  condition: ["healthy"]
  trimester: ["First trimester", "Second trimester"]

phenotype:
  group_column: "trimester"
  baseline: "First trimester"
  contrast: "Second trimester"
  covariates: ["fetux_sex_estimate"]

imputation:
  softimpute:
    enabled: true
    rank_max: 30
    lambda: 0
    thresh: 1e-4
    maxit: 50
    type: "als"
  none:
    enabled: true

normalization:
  combat:
    enabled: true

coverage:
  max_imputation_allowed: 1.0
  drop_imputed_genes_missing_in_group: true

de:
  imputed_cell_weight: 0.0

thresholds:
  fdr: 0.05
  logfc: 1.0

gene_filter:
  protein_coding_only: true
  min_variance: 0.01

output:
  save_imputed_matrices: true
  save_normalized_matrices: true
  save_validation_report: false
  save_comparison_plots: true
